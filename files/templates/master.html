opengraph = []
title = "nh3.dev"
---
<!DOCTYPE html>
<html lang=en>
	<head>
		<meta charset="UTF-8">
		<link href="/theme.css" rel="stylesheet"/>
		<link href="/style/style.css" rel="stylesheet"/>
		<meta name="viewport" content="width=device-width, initial-scale=1"/>
		<meta name="robots" content="noai, noimageai"/>

		{{opengraph}}
		<meta property="og:url" content="http://nh3.dev"/>
		<meta property="og:image" content="https://nh3.dev/assets/nh3-spin.gif"/>
		<meta property="theme-color" content="#305182"/>
		<title>{{title}}</title>

		<!-- I'm sorry, maj made me do this -->
		<script>
			const set_theme = (name) =>
				document.cookie = `t=${name}; path=/; max-age=31536000`;

			// set current ?t= tag to the last chosen theme
			window.addEventListener("load", () => {
				if (new URLSearchParams(window.location.search).get('t')) return;
				if (!document.cookie) return;

				const theme = document.cookie.split('; ')
					.find(c => c.startsWith('t'))
					.split('=')[1];

				const url = new URL(window.location);
				url.searchParams.set("t", theme);
				window.location.replace(url);
			});
		</script>
	</head>

	<body>
		<header>
			<a href="/">Home</a>
			<a href="/projects">Projects</a>
			<a href="/rocks">Rocks</a>
			<a href="/blog">Articles</a>

			<div class=dropdown>
				<button>Theme</button>
				<div class="dropdown-content">
					<a href="?t=nord"    onclick="set_theme('nord')">nord</a>
					<a href="?t=gruvbox" onclick="set_theme('gruvbox')">gruvbox</a>
					<a href="?t=classic" onclick="set_theme('classic')">classic</a>
					<a href="?t=mustard" onclick="set_theme('mustard')">mustard</a>
				</div>
			</div>
		</header>

		<article>
			{{body}}
		</article>

		<footer>
			<!-- please specify width and height for fast layout -->
			<img src="/assets/nh3.gif" width=88 height=31 />
			<a href="https://512kb.club"><img src="/assets/512kb-green.gif" width=88 height=31 /></a>
			<a href="https://creativecommons.org/publicdomain/zero/1.0/"><img src="/assets/cc0.gif" width=88 height=31 /></a>
		</footer>
	</body>
</html>
